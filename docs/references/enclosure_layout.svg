<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <pattern id="foam" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#FFE0B2"/>
      <circle cx="3" cy="3" r="1" fill="#FFCC80" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" rx="12" fill="#FAFBFC" stroke="#DEE2E6" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1B3A5C">Enclosure Layout — Top-Down View</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#888">Zulkit IP65 ABS Box (63 × 58 × 35mm internal)</text>

  <!-- ===== ENCLOSURE OUTER SHELL ===== -->
  <rect x="140" y="90" width="440" height="380" rx="14" fill="#E0E0E0" stroke="#666" stroke-width="3" filter="url(#shadow)"/>
  <text x="160" y="82" font-size="10" fill="#888">Zulkit enclosure (outer)</text>

  <!-- Screw holes -->
  <circle cx="160" cy="110" r="6" fill="#999" stroke="#666" stroke-width="1.5"/>
  <circle cx="560" cy="110" r="6" fill="#999" stroke="#666" stroke-width="1.5"/>
  <circle cx="160" cy="450" r="6" fill="#999" stroke="#666" stroke-width="1.5"/>
  <circle cx="560" cy="450" r="6" fill="#999" stroke="#666" stroke-width="1.5"/>

  <!-- Foam tape lining -->
  <rect x="165" y="115" width="390" height="330" rx="8" fill="url(#foam)" stroke="#E67E22" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="550" y="130" font-size="9" fill="#E67E22" text-anchor="end">Foam tape lining</text>

  <!-- ===== ESP32-S3 FEATHER (bottom board) ===== -->
  <rect x="185" y="145" width="200" height="82" rx="6" fill="#E8F4FD" stroke="#2E75B6" stroke-width="2"/>
  <text x="285" y="167" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E75B6">ESP32-S3 Feather</text>
  <text x="285" y="182" text-anchor="middle" font-size="10" fill="#666">(bottom of stack)</text>

  <!-- USB-C port indicator -->
  <rect x="172" y="162" width="16" height="30" rx="3" fill="#27AE60" stroke="#1E8449" stroke-width="1.5"/>
  <text x="128" y="182" font-size="9" fill="#27AE60" font-weight="bold" text-anchor="end">USB-C</text>
  <!-- Arrow to hole -->
  <line x1="140" y1="177" x2="155" y2="177" stroke="#27AE60" stroke-width="1.5"/>

  <!-- STEMMA QT port -->
  <rect x="382" y="172" width="10" height="14" rx="2" fill="#2E75B6"/>
  <text x="400" y="184" font-size="8" fill="#2E75B6">QT</text>

  <!-- JST battery port -->
  <rect x="340" y="148" width="14" height="10" rx="2" fill="#E67E22"/>
  <text x="360" y="156" font-size="8" fill="#E67E22">BAT</text>

  <!-- ===== ADALOGGER FEATHERWING (stacked on top) ===== -->
  <rect x="185" y="232" width="200" height="72" rx="6" fill="#F0E8FD" stroke="#8E44AD" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="285" y="254" text-anchor="middle" font-size="12" font-weight="bold" fill="#8E44AD">Adalogger FeatherWing</text>
  <text x="285" y="270" text-anchor="middle" font-size="10" fill="#666">(stacked on Feather)</text>

  <!-- SD card slot -->
  <rect x="182" y="244" width="8" height="20" rx="2" fill="#666"/>
  <text x="128" y="258" font-size="9" fill="#666" font-weight="bold" text-anchor="end">SD slot</text>
  <line x1="140" y1="254" x2="155" y2="254" stroke="#666" stroke-width="1"/>

  <!-- Stacking indicator -->
  <text x="285" y="290" text-anchor="middle" font-size="9" fill="#8E44AD" font-style="italic">Sits on pin headers above Feather</text>

  <!-- ===== IMU #1 ===== -->
  <rect x="420" y="145" width="110" height="72" rx="6" fill="#E8FDF0" stroke="#27AE60" stroke-width="2"/>
  <text x="475" y="168" text-anchor="middle" font-size="11" font-weight="bold" fill="#27AE60">IMU #1</text>
  <text x="475" y="182" text-anchor="middle" font-size="9" fill="#666">LSM6DSOX</text>
  <text x="475" y="195" text-anchor="middle" font-size="9" fill="#666">0x6A</text>
  <text x="475" y="208" text-anchor="middle" font-size="8" fill="#27AE60">X-axis → along bar</text>

  <!-- STEMMA QT cable from feather to IMU #1 -->
  <path d="M392,179 Q406,179 416,172" fill="none" stroke="#2E75B6" stroke-width="2.5"/>
  <text x="404" y="170" font-size="8" fill="#2E75B6">50mm</text>

  <!-- ===== IMU #2 ===== -->
  <rect x="420" y="232" width="110" height="72" rx="6" fill="#FDF8E8" stroke="#E67E22" stroke-width="2"/>
  <text x="475" y="255" text-anchor="middle" font-size="11" font-weight="bold" fill="#E67E22">IMU #2</text>
  <text x="475" y="269" text-anchor="middle" font-size="9" fill="#666">LSM6DSOX</text>
  <text x="475" y="282" text-anchor="middle" font-size="9" fill="#666">0x6B (jumper cut)</text>
  <text x="475" y="295" text-anchor="middle" font-size="8" fill="#E67E22">Rotated 90° from #1</text>

  <!-- Cable from IMU #1 to IMU #2 -->
  <path d="M475,217 L475,228" fill="none" stroke="#E67E22" stroke-width="2.5"/>
  <text x="494" y="224" font-size="8" fill="#E67E22">QT</text>

  <!-- ===== BATTERY ===== -->
  <rect x="185" y="330" width="140" height="80" rx="8" fill="#FDE8E8" stroke="#E74C3C" stroke-width="2"/>
  <text x="255" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="#E74C3C">500mAh LiPo</text>
  <text x="255" y="376" text-anchor="middle" font-size="10" fill="#666">29 × 36 × 4.75mm</text>
  <text x="255" y="392" text-anchor="middle" font-size="9" fill="#E74C3C">Secured with foam tape</text>

  <!-- JST cable to feather -->
  <path d="M255,330 Q260,316 340,158" fill="none" stroke="#E67E22" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ===== STEMMA QT cable routing ===== -->
  <path d="M392,179 C410,179 420,160 420,145" fill="none" stroke="#2E75B6" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- ===== USB-C HOLE ===== -->
  <rect x="140" y="158" width="28" height="38" rx="4" fill="none" stroke="#E74C3C" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="92" y="168" font-size="9" fill="#E74C3C" font-weight="bold" text-anchor="end">Drill hole</text>
  <text x="92" y="180" font-size="9" fill="#E74C3C" text-anchor="end">for USB-C</text>
  <text x="92" y="192" font-size="8" fill="#E74C3C" text-anchor="end">(~10mm Ø)</text>

  <!-- ===== BOLT HOLES (bottom) ===== -->
  <circle cx="280" cy="440" r="5" fill="none" stroke="#E74C3C" stroke-width="2" stroke-dasharray="3,2"/>
  <circle cx="440" cy="440" r="5" fill="none" stroke="#E74C3C" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="360" y="444" text-anchor="middle" font-size="9" fill="#E74C3C" font-weight="bold">P-clamp bolt holes (5mm, bottom face)</text>

  <!-- ===== DIMENSIONS ===== -->
  <!-- Width -->
  <line x1="140" y1="490" x2="580" y2="490" stroke="#333" stroke-width="1"/>
  <line x1="140" y1="485" x2="140" y2="495" stroke="#333" stroke-width="1"/>
  <line x1="580" y1="485" x2="580" y2="495" stroke="#333" stroke-width="1"/>
  <text x="360" y="505" text-anchor="middle" font-size="11" fill="#333">63mm</text>

  <!-- Height -->
  <line x1="600" y1="90" x2="600" y2="470" stroke="#333" stroke-width="1"/>
  <line x1="595" y1="90" x2="605" y2="90" stroke="#333" stroke-width="1"/>
  <line x1="595" y1="470" x2="605" y2="470" stroke="#333" stroke-width="1"/>
  <text x="618" y="285" font-size="11" fill="#333" transform="rotate(90,618,285)">58mm</text>

  <!-- ===== LEGEND ===== -->
  <rect x="140" y="530" width="520" height="150" rx="8" fill="white" stroke="#DEE2E6" stroke-width="1.5"/>
  <text x="160" y="554" font-size="13" font-weight="bold" fill="#1B3A5C">Assembly Notes</text>

  <circle cx="170" cy="580" r="5" fill="#2E75B6"/>
  <text x="185" y="584" font-size="10" fill="#333">STEMMA QT 50mm cable connects Feather to IMU #1 (plug-and-play)</text>

  <circle cx="170" cy="602" r="5" fill="#E67E22"/>
  <text x="185" y="606" font-size="10" fill="#333">IMU #1 to IMU #2: needs a second STEMMA QT cable (50mm or 100mm)</text>

  <circle cx="170" cy="624" r="5" fill="#E74C3C"/>
  <text x="185" y="628" font-size="10" fill="#333">Cut SDO/SA0 solder jumper on IMU #2 to change address to 0x6B</text>

  <circle cx="170" cy="646" r="5" fill="#8E44AD"/>
  <text x="185" y="650" font-size="10" fill="#333">Adalogger stacks onto Feather — MicroSD slot should face the wall with the USB-C hole</text>

  <circle cx="170" cy="668" r="5" fill="#999"/>
  <text x="185" y="672" font-size="10" fill="#333">Secure all components with thin foam tape strips to prevent movement during lifts</text>
</svg>
